<html>

<head>
</head>
<style>
    html {
        container-type: normal;
        --stopped: 0;
    }

    html:has(#stop:checked) {
        --stopped: 1;
    }

    @media (prefers-reduced-motion: reduce) {
        html {
            --stopped: 1;
        }
    }

    body {
        background: #1729b2;
        overflow: hidden;
        padding: 0;
        margin: 0;
    }

    .parent {
        height: 100%;
        position: relative;
        width: 100%;
        overflow: hidden;
    }

    .rat-race {
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        overflow: hidden;
    }

    .paradise {
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        overflow: hidden;
        visibility: hidden;
    }

    .stop-it {
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%) rotate(10deg);
        z-index: 1000;


        font-size: clamp(1rem, 40vw, 40rem);

        color: rgba(0, 0, 0, 0);
        font-family: sans-serif;

        animation-duration: 1s;
        animation-name: breathe;
        animation-direction: alternate;
        animation-iteration-count: infinite;
        opacity: 70%;
    }

    @keyframes breathe {

        0% {
            text-shadow: red 75px 75px,
                black -1px -1px;
        }

        50% {
            text-shadow: red 1px 1px,
                black -1px -1px;
        }

        100% {
            text-shadow: red 1px 1px,
                black -75px -75px;
        }
    }

    .hidden {
        display: none;
    }

    @container style(--stopped: 1) {
        .rat-race {
            display: none;
            width: 0;
        }

        .stop-it {
            display: none;
            width: 0;
            animation-iteration-count: 0;
        }

        .paradise {
            visibility: visible;
        }

        body {
            background: black;
        }
    }

</style>

<body>
    <div class="parent">
        <input type="checkbox" id="stop" class="hidden" />
        <label for="stop" class="stop-it">STOP</label>
        <img class="rat-race" src="./BORED.gif"></img>
        <img class="paradise" src="./paradise.png"></img>
    </div>
</body>

</html>
